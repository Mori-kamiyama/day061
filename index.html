<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>先輩風メータ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@500;700&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="screen" aria-label="先輩風メータ">
        <section class="meter-layout">
            <img class="title-mark" src="./data/title.svg" alt="先輩風メーター！">

            <section class="meter-stage" aria-live="polite" aria-atomic="true">
                <svg class="meter-arc" viewBox="0 0 328 170" aria-hidden="true">
                    <path
                        id="meterTrack"
                        class="meter-arc-track"
                        d="M 20 150 A 144 144 0 0 1 308 150"
                    />
                    <path
                        id="meterProgress"
                        class="meter-arc-progress"
                        d="M 20 150 A 144 144 0 0 1 308 150"
                    />
                </svg>

                <div class="meter-readout">
                    <img class="meter-label-svg" src="./data/wind_speed.svg" alt="風速">
                    <p class="speed-value" id="speedValue">?</p>
                    <img class="meter-unit-svg" src="./data/m_per_s.svg" alt="m/s">
                </div>

                <p class="speed-copy" id="speedCopy">録音待機中</p>
            </section>

            <p class="status-line" id="statusLine" role="status" aria-live="polite">モデル読み込み中</p>

            <section class="message-card" aria-live="polite" aria-atomic="true">
                <p class="message-card-text" id="messageCardText">徹夜なんてして当たり前</p>
            </section>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
